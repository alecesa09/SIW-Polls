<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione al Sistema</title>
    <link rel="stylesheet" href="global.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; /* Aggiunto padding per evitare che tocchi i bordi su schermi piccoli */
            box-sizing: border-box;
        }
        .form-box {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px; /* Leggermente più largo del login */
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        h3 {
            font-size: 1.1em;
            color: #444;
            margin-top: 20px;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 0.9em;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 1rem;
        }
        button:hover {
            background-color: #004494;
        }
        .error-message {
            color: #d9534f;
            background-color: #f2dede;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.9em;
            list-style-type: none; /* Rimuove i pallini dalla lista degli errori globali */
            margin-top: 0;
        }
        .field-error {
            color: #d9534f;
            font-size: 0.85em;
            margin-top: 5px;
            display: block;
        }
        .link-centrato {
            display: block;       
            text-align: center;   
            margin-top: 15px;     
            color: #0056b3;       
            text-decoration: none;
            font-size: 0.9em;
        }
        .link-centrato:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>Registrati</h2>
        
        <form th:action="@{/register}" method="POST">
            
            <div th:object="${utente}">
                <!-- Errori globali stilizzati come il box rosso del login -->
                <ul class="error-message" th:if="${#fields.hasGlobalErrors()}" style="padding-left: 0;">
                    <li th:each="err : ${#fields.globalErrors()}" th:text="${err}"></li>
                </ul>
                
                <h3>Dati Personali</h3>
                
                <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" th:field="*{nome}" />
                    <span class="field-error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
                </div>
                
                <div class="form-group">
                    <label for="cognome">Cognome:</label>
                    <input type="text" id="cognome" th:field="*{cognome}" />
                    <span class="field-error" th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}"></span>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="text" id="email" th:field="*{email}" />
                    <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                </div>
            </div>
            
            <div th:object="${credentials}">
                <h3>Dati di Accesso</h3>
                
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" th:field="*{username}" required />
                    <span class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
                </div>
                
                <div class="form-group">
                    <label for="psw">Password:</label>
                    <input type="password" id="psw" th:field="*{psw}" required />
                    <span class="field-error" th:if="${#fields.hasErrors('psw')}" th:errors="*{psw}"></span>
                </div>
            </div>
        
            <button type="submit">Registrati</button>
            <a href="/login" class="link-centrato">Hai già un account? Accedi</a>
        </form>
    </div>

</body>
</html>
